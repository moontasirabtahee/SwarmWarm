name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: python -m pytest

  migrations:
    name: Alembic migrations (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: swarmwarm
          POSTGRES_PASSWORD: swarmwarm
          POSTGRES_DB: swarmwarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swarmwarm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://swarmwarm:swarmwarm@localhost:5432/swarmwarm
      SWARMWARM_SECRET_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      SWARMWARM_JWT_SECRET: "ci-jwt-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply migrations to PostgreSQL
        run: alembic upgrade head
      - name: Verify schema imports + boots against PostgreSQL
        run: python -c "import app.core.db; print('DB init OK on PostgreSQL')"
