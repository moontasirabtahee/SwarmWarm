# Alembic configuration for SwarmWarm.
# The database URL is resolved at runtime from app settings (DATABASE_URL), so the
# sqlalchemy.url below is only a placeholder and is overridden in alembic/env.py.
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///swarmwarm.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
