# SwarmWarm full stack: Postgres + Redis + FastAPI web + Celery worker + Celery beat.
# Usage:  cp .env.template .env  &&  docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swarmwarm
      POSTGRES_PASSWORD: swarmwarm
      POSTGRES_DB: swarmwarm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarmwarm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: ["web"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://swarmwarm:swarmwarm@db:5432/swarmwarm
      REDIS_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: ["worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://swarmwarm:swarmwarm@db:5432/swarmwarm
      REDIS_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: ["beat"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://swarmwarm:swarmwarm@db:5432/swarmwarm
      REDIS_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
